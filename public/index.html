<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codebox Command Center</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- Design system CSS -->
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">

  <!-- ES module import map -->
  <script type="importmap">
  {
    "imports": {
      "embla-carousel": "./vendor/embla-carousel.esm.js",
      "#state": "./modules/state.js",
      "#sse": "./modules/sse.js",
      "#sessions": "./modules/sessions.js",
      "#conversation": "./modules/conversation.js",
      "#sidebar": "./modules/sidebar.js",
      "#toasts": "./modules/toasts.js",
      "#audio": "./modules/audio.js",
      "#sdk": "./modules/sdk-client.js",
      "#utils": "./modules/utils.js"
    }
  }
  </script>

  <!-- App entry point -->
  <script type="module" src="./modules/app.js"></script>
</head>
<body>
  <div class="command-center">
    <header class="header glass-panel">
      <span class="header-title">Codebox Command Center</span>
      <div class="header-right">
        <a href="/hooks/install" class="header-link" title="Set up hooks on remote machines">Hook Installer</a>
        <div class="connection-status">
          <span class="connection-dot"></span>
          <span class="connection-label">Connecting...</span>
        </div>
      </div>
    </header>

    <div class="session-overview" id="session-grid">
      <!-- Session cards rendered by sessions.js -->
    </div>

    <div class="conversation-panel glass-card" id="conversation-panel">
      <!-- Conversation rendered by conversation.js -->
    </div>

    <aside class="sidebar glass-panel" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Control Panel</span>
        <button class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="16" height="14" rx="2"/>
            <line x1="8" y1="3" x2="8" y2="17"/>
          </svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-nav-btn active" data-section="sessions" aria-label="Sessions" title="Sessions">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="8" height="7" rx="1.5"/>
            <rect x="14" y="3" width="8" height="7" rx="1.5"/>
            <rect x="2" y="14" width="8" height="7" rx="1.5"/>
            <rect x="14" y="14" width="8" height="7" rx="1.5"/>
          </svg>
          <span class="sidebar-nav-label">Sessions</span>
        </button>
        <button class="sidebar-nav-btn" data-section="voice" aria-label="Voice" title="Voice">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="2" width="8" height="12" rx="4"/>
            <path d="M4 12a8 8 0 0016 0"/>
            <line x1="12" y1="20" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
          <span class="sidebar-nav-label">Voice</span>
        </button>
        <button class="sidebar-nav-btn" data-section="settings" aria-label="Settings" title="Settings">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          <span class="sidebar-nav-label">Settings</span>
        </button>
      </nav>
      <div class="sidebar-content">
        <!-- Section content rendered by sidebar.js -->
      </div>
    </aside>

    <div id="toast-container"></div>
  </div>
</body>
</html>
