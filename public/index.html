<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Command Center</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- Design system CSS -->
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">

  <!-- ES module import map -->
  <script type="importmap">
  {
    "imports": {
      "embla-carousel": "./vendor/embla-carousel.esm.js",
      "#state": "./modules/state.js",
      "#sse": "./modules/sse.js",
      "#sessions": "./modules/sessions.js",
      "#conversation": "./modules/conversation.js",
      "#sidebar": "./modules/sidebar.js",
      "#toasts": "./modules/toasts.js",
      "#audio": "./modules/audio.js",
      "#sdk": "./modules/sdk-client.js",
      "#utils": "./modules/utils.js"
    }
  }
  </script>

  <!-- App entry point -->
  <script type="module" src="./modules/app.js"></script>
</head>
<body>
  <div class="command-center">
    <header class="header glass-panel">
      <span class="header-title">Claude Command Center</span>
      <div class="header-right">
        <div class="connection-status">
          <span class="connection-dot"></span>
          <span class="connection-label">Connecting...</span>
        </div>
        <button class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="16" height="14" rx="2"/>
            <line x1="8" y1="3" x2="8" y2="17"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="session-overview" id="session-grid">
      <!-- Session cards rendered by sessions.js -->
    </div>

    <div class="conversation-panel glass-card" id="conversation-panel">
      <!-- Conversation rendered by conversation.js -->
    </div>

    <aside class="sidebar glass-panel" id="sidebar">
      <div class="sidebar-content">
        <!-- Sidebar rendered by sidebar.js -->
      </div>
    </aside>

    <div id="toast-container"></div>
  </div>
</body>
</html>
