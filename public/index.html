<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Notifications</title>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #1c2128;
      --bg-input: #0d1117;
      --border: #30363d;
      --border-active: #484f58;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-done: #3fb950;
      --accent-question: #f0883e;
      --accent-working: #58a6ff;
      --accent-danger: #f85149;
      --glow-done: 0 0 12px rgba(63, 185, 80, 0.3);
      --glow-question: 0 0 12px rgba(240, 136, 62, 0.3);
      --glow-working: 0 0 12px rgba(88, 166, 255, 0.3);
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-ui);
      overflow: hidden;
    }

    /* === HEADER === */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }

    .header-title {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-danger);
      transition: background 0.3s;
    }

    .connection-dot.connected {
      background: var(--accent-done);
      box-shadow: 0 0 6px rgba(63, 185, 80, 0.5);
    }

    .header-gear {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s, color 0.2s;
    }

    .header-gear:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    /* === DASHBOARD LAYOUT === */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      height: 100vh;
      padding: 68px 20px 20px 20px;
    }

    .main-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    /* === STATS BAR === */
    .stats-bar {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .stat-card {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 600;
      font-family: var(--font-mono);
    }

    .stat-value.accent-working { color: var(--accent-working); }
    .stat-value.accent-done { color: var(--accent-done); }
    .stat-value.accent-question { color: var(--accent-question); }
    .stat-value.accent-muted { color: var(--text-muted); }

    /* === SESSION GRID === */
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .section-count {
      font-size: 0.65rem;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .session-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      padding-right: 4px;
    }

    .session-grid::-webkit-scrollbar {
      width: 6px;
    }

    .session-grid::-webkit-scrollbar-track {
      background: transparent;
    }

    .session-grid::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .session-grid-empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    .session-grid-empty-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      opacity: 0.4;
    }

    /* === SESSION CARDS === */
    .session-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      transition: border-color 0.3s, box-shadow 0.3s, opacity 0.3s;
    }

    .session-card.status-working {
      border-left-color: var(--accent-working);
      box-shadow: var(--glow-working);
    }

    .session-card.status-done {
      border-left-color: var(--accent-done);
      box-shadow: var(--glow-done);
    }

    .session-card.status-attention {
      border-left-color: var(--accent-question);
      box-shadow: var(--glow-question);
      animation: pulse-attention 2s ease-in-out infinite;
    }

    .session-card.status-stale {
      opacity: 0.45;
      border-left-color: var(--border);
    }

    @keyframes pulse-attention {
      0%, 100% { box-shadow: var(--glow-question); }
      50% { box-shadow: 0 0 20px rgba(240, 136, 62, 0.5); }
    }

    .session-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .session-project {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .session-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .session-badge.badge-working {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent-working);
    }

    .session-badge.badge-done {
      background: rgba(63, 185, 80, 0.15);
      color: var(--accent-done);
    }

    .session-badge.badge-attention {
      background: rgba(240, 136, 62, 0.15);
      color: var(--accent-question);
    }

    .session-badge.badge-stale {
      background: rgba(110, 118, 129, 0.15);
      color: var(--text-muted);
    }

    .session-badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .badge-working .session-badge-dot { background: var(--accent-working); }
    .badge-done .session-badge-dot { background: var(--accent-done); }
    .badge-attention .session-badge-dot { background: var(--accent-question); }
    .badge-stale .session-badge-dot { background: var(--text-muted); }

    .session-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .session-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .session-machine {
      color: var(--text-muted);
    }

    .session-duration {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* === ACTIVITY FEED (RIGHT COLUMN) === */
    .activity-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .activity-feed {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-right: 4px;
    }

    .activity-feed::-webkit-scrollbar {
      width: 6px;
    }

    .activity-feed::-webkit-scrollbar-track {
      background: transparent;
    }

    .activity-feed::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .feed-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      transition: background 0.2s;
    }

    .feed-item:hover {
      background: var(--bg-card);
    }

    .feed-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .feed-item.type-done .feed-icon {
      background: rgba(63, 185, 80, 0.15);
      color: var(--accent-done);
    }

    .feed-item.type-question .feed-icon {
      background: rgba(240, 136, 62, 0.15);
      color: var(--accent-question);
    }

    .feed-content {
      flex: 1;
      min-width: 0;
    }

    .feed-project {
      font-weight: 600;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-type {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: capitalize;
    }

    .feed-time {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .feed-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
    }

    /* === TOAST SYSTEM === */
    #toast-container {
      position: fixed;
      top: 64px;
      right: 20px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
      pointer-events: none;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateX(40px);
      animation: toast-in 0.3s ease forwards;
      pointer-events: auto;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .toast.toast-out {
      animation: toast-out 0.3s ease forwards;
    }

    .toast-done {
      border-left-color: var(--accent-done);
    }

    .toast-question {
      border-left-color: var(--accent-question);
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes toast-out {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(40px); }
    }

    .toast-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .toast-done .toast-icon {
      background: rgba(63, 185, 80, 0.15);
      color: var(--accent-done);
    }

    .toast-question .toast-icon {
      background: rgba(240, 136, 62, 0.15);
      color: var(--accent-question);
    }

    .toast-content {
      flex: 1;
      min-width: 0;
    }

    .toast-label {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .toast-project {
      font-size: 0.75rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast-time {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* === PUSH BANNER === */
    .push-banner {
      position: fixed;
      top: 52px;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      z-index: 99;
    }

    .push-banner button {
      padding: 4px 12px;
      border-radius: 12px;
      border: none;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .push-banner .push-enable-btn {
      background: var(--accent-working);
      color: #fff;
    }

    .push-banner .push-enable-btn:hover {
      background: #79b8ff;
    }

    .push-banner .push-dismiss-btn {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .push-banner .push-dismiss-btn:hover {
      background: var(--bg-card);
      color: var(--text-secondary);
    }

    /* === RESPONSIVE === */
    @media (max-width: 900px) {
      .dashboard {
        grid-template-columns: 1fr;
      }

      .activity-panel {
        max-height: 300px;
      }

      #toast-container {
        width: 280px;
        right: 10px;
      }
    }
  </style>
</head>
<body>

  <header class="header">
    <span class="header-title">Claude Notifications</span>
    <div class="header-right">
      <div class="connection-status">
        <span class="connection-dot" id="connectionDot"></span>
        <span id="connectionText">Connecting...</span>
      </div>
      <button class="header-gear" id="gearBtn" title="Settings">&#9881;</button>
    </div>
  </header>

  <div id="push-banner" class="push-banner" style="display:none">
    <span>Enable browser push notifications for background alerts</span>
    <button class="push-enable-btn" onclick="enablePush()">Enable</button>
    <button class="push-dismiss-btn" onclick="dismissBanner()">Dismiss</button>
  </div>

  <main class="dashboard">
    <div class="main-content">
      <div class="stats-bar">
        <div class="stat-card">
          <span class="stat-label">Active Sessions</span>
          <span class="stat-value accent-working" id="statSessions">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Events Today</span>
          <span class="stat-value accent-done" id="statEvents">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Attention</span>
          <span class="stat-value accent-question" id="statAttention">0</span>
        </div>
      </div>

      <div>
        <div class="section-header">
          <span class="section-title">Sessions</span>
          <span class="section-count" id="sessionCount">0</span>
        </div>
        <div class="session-grid" id="sessionGrid">
          <div class="session-grid-empty">
            <div class="session-grid-empty-icon">&#9673;</div>
            <div>No active sessions</div>
            <div style="font-size:0.75rem;margin-top:4px;color:var(--text-muted)">Sessions appear when Claude Code is running</div>
          </div>
        </div>
      </div>
    </div>

    <div class="activity-panel">
      <div class="section-header">
        <span class="section-title">Activity Feed</span>
        <span class="section-count" id="feedCount">0</span>
      </div>
      <div class="activity-feed" id="activityFeed">
        <div class="feed-empty">Waiting for events...</div>
      </div>
    </div>
  </main>

  <div id="toast-container"></div>

  <script>
  // === STATE ===
  const sessions = new Map();
  const activityFeed = [];
  const MAX_FEED = 50;
  const MAX_TOASTS = 5;
  let notifyCount = 0;
  let localConfig = {};

  // === DOM REFS ===
  const sessionGrid = document.getElementById('sessionGrid');
  const feedContainer = document.getElementById('activityFeed');
  const toastContainer = document.getElementById('toast-container');
  const connectionDot = document.getElementById('connectionDot');
  const connectionText = document.getElementById('connectionText');
  const statSessions = document.getElementById('statSessions');
  const statEvents = document.getElementById('statEvents');
  const statAttention = document.getElementById('statAttention');
  const sessionCount = document.getElementById('sessionCount');
  const feedCount = document.getElementById('feedCount');

  // === SSE CONNECTION ===
  let eventSource = null;

  function connectSSE() {
    if (eventSource) {
      try { eventSource.close(); } catch(e) {}
    }
    eventSource = new EventSource('/events');

    eventSource.addEventListener('trigger', (e) => {
      const data = JSON.parse(e.data);
      const { type, project, machine, sessionId, timestamp } = data;

      // Update session
      const existing = sessions.get(sessionId) || {};
      sessions.set(sessionId, {
        project: project || existing.project || 'Unknown',
        machine: machine || existing.machine || 'unknown',
        status: type === 'question' ? 'attention' : 'done',
        lastActivity: Date.now(),
        startedAt: existing.startedAt || Date.now()
      });

      // Add to activity feed
      activityFeed.unshift({
        type: type || 'done',
        project: project || 'Unknown',
        machine: machine || 'unknown',
        timestamp: timestamp || Date.now()
      });
      if (activityFeed.length > MAX_FEED) activityFeed.pop();

      notifyCount++;

      showToast(type || 'done', project || 'Unknown');
      playVoice(type || 'done', project || '');
      renderSessions();
      renderFeed();
      updateStats();
    });

    eventSource.addEventListener('session:alive', (e) => {
      const data = JSON.parse(e.data);
      const { sessionId, project, machine } = data;
      const existing = sessions.get(sessionId) || {};
      sessions.set(sessionId, {
        project: project || existing.project || 'Unknown',
        machine: machine || existing.machine || 'unknown',
        status: 'working',
        lastActivity: Date.now(),
        startedAt: existing.startedAt || Date.now()
      });
      renderSessions();
      updateStats();
    });

    eventSource.addEventListener('config:updated', (e) => {
      localConfig = JSON.parse(e.data);
    });

    eventSource.addEventListener('connection:health', () => {
      // Keepalive received — connection is healthy
    });

    eventSource.onopen = () => {
      connectionDot.classList.add('connected');
      connectionText.textContent = 'Connected';
    };

    eventSource.onerror = () => {
      connectionDot.classList.remove('connected');
      connectionText.textContent = 'Reconnecting...';
      if (eventSource.readyState === EventSource.CLOSED) {
        setTimeout(connectSSE, 3000);
      }
    };
  }

  // === SESSION GRID ===
  function renderSessions() {
    const sorted = [...sessions.entries()].sort((a, b) => {
      const order = { attention: 0, working: 1, done: 2, stale: 3 };
      const diff = (order[a[1].status] || 4) - (order[b[1].status] || 4);
      if (diff !== 0) return diff;
      return b[1].lastActivity - a[1].lastActivity;
    });

    sessionCount.textContent = sorted.length;

    if (sorted.length === 0) {
      sessionGrid.innerHTML = '<div class="session-grid-empty">' +
        '<div class="session-grid-empty-icon">&#9673;</div>' +
        '<div>No active sessions</div>' +
        '<div style="font-size:0.75rem;margin-top:4px;color:var(--text-muted)">Sessions appear when Claude Code is running</div>' +
        '</div>';
      return;
    }

    sessionGrid.innerHTML = '';
    for (const [id, session] of sorted) {
      const card = document.createElement('div');
      card.className = 'session-card status-' + session.status;

      const badgeClass = session.status === 'attention' ? 'badge-attention' :
        session.status === 'done' ? 'badge-done' :
        session.status === 'stale' ? 'badge-stale' : 'badge-working';

      const badgeLabel = session.status === 'attention' ? 'Attention' :
        session.status === 'done' ? 'Done' :
        session.status === 'stale' ? 'Stale' : 'Working';

      card.innerHTML =
        '<div class="session-card-header">' +
          '<span class="session-project" title="' + escapeHtml(session.project) + '">' + escapeHtml(session.project) + '</span>' +
          '<span class="session-badge ' + badgeClass + '">' +
            '<span class="session-badge-dot"></span>' +
            badgeLabel +
          '</span>' +
        '</div>' +
        '<div class="session-meta">' +
          '<div class="session-meta-row">' +
            '<span class="session-machine">' + escapeHtml(session.machine) + '</span>' +
            '<span class="session-duration">' + formatDuration(session.startedAt) + '</span>' +
          '</div>' +
          '<div class="session-meta-row">' +
            '<span>Last activity: ' + formatRelativeTime(session.lastActivity) + '</span>' +
          '</div>' +
        '</div>';

      sessionGrid.appendChild(card);
    }
  }

  // === SESSION TTL ===
  setInterval(() => {
    const now = Date.now();
    let changed = false;
    for (const [id, session] of sessions) {
      const elapsed = now - session.lastActivity;
      if (elapsed > 30 * 60 * 1000) {
        sessions.delete(id);
        changed = true;
      } else if (elapsed > 5 * 60 * 1000 && session.status !== 'stale') {
        session.status = 'stale';
        changed = true;
      }
    }
    if (changed) {
      renderSessions();
      updateStats();
    }
  }, 10000);

  // === ACTIVITY FEED ===
  function renderFeed() {
    feedCount.textContent = activityFeed.length;

    if (activityFeed.length === 0) {
      feedContainer.innerHTML = '<div class="feed-empty">Waiting for events...</div>';
      return;
    }

    feedContainer.innerHTML = '';
    for (const item of activityFeed) {
      const el = document.createElement('div');
      el.className = 'feed-item type-' + item.type;

      const icon = item.type === 'question' ? '?' : '\u2713';
      const ts = new Date(item.timestamp);
      const timeStr = ts.getHours().toString().padStart(2, '0') + ':' +
        ts.getMinutes().toString().padStart(2, '0') + ':' +
        ts.getSeconds().toString().padStart(2, '0');

      el.innerHTML =
        '<span class="feed-icon">' + icon + '</span>' +
        '<div class="feed-content">' +
          '<div class="feed-project">' + escapeHtml(item.project) + '</div>' +
          '<div class="feed-type">' + item.type + '</div>' +
        '</div>' +
        '<span class="feed-time">' + timeStr + '</span>';

      feedContainer.appendChild(el);
    }
  }

  // === TOAST SYSTEM ===
  function showToast(type, project) {
    const toast = document.createElement('div');
    toast.className = 'toast toast-' + type;

    const icon = type === 'question' ? '?' : '\u2713';
    const label = type === 'question' ? 'Needs Attention' : 'Done';
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ':' +
      now.getMinutes().toString().padStart(2, '0') + ':' +
      now.getSeconds().toString().padStart(2, '0');

    toast.innerHTML =
      '<span class="toast-icon">' + icon + '</span>' +
      '<div class="toast-content">' +
        '<div class="toast-label">' + label + '</div>' +
        '<div class="toast-project">' + escapeHtml(project) + '</div>' +
      '</div>' +
      '<span class="toast-time">' + timeStr + '</span>';

    toastContainer.prepend(toast);

    // Limit max toasts
    while (toastContainer.children.length > MAX_TOASTS) {
      toastContainer.lastElementChild.remove();
    }

    // Auto-dismiss
    const duration = type === 'question' ? 15000 : 8000;
    setTimeout(() => {
      toast.classList.add('toast-out');
      setTimeout(() => {
        if (toast.parentNode) toast.remove();
      }, 300);
    }, duration);
  }

  // === VOICE PLAYBACK ===
  function playVoice(type, project) {
    try {
      const audio = new Audio('/notify-wav?type=' + encodeURIComponent(type) + '&project=' + encodeURIComponent(project) + '&t=' + Date.now());
      audio.play().catch(() => {});
    } catch(e) {}
  }

  // === STATS ===
  function updateStats() {
    let activeCount = 0;
    let attentionCount = 0;
    for (const [, s] of sessions) {
      if (s.status !== 'stale') activeCount++;
      if (s.status === 'attention') attentionCount++;
    }
    statSessions.textContent = activeCount;
    statEvents.textContent = notifyCount;
    statAttention.textContent = attentionCount;
  }

  // === UTILITY ===
  function formatRelativeTime(ts) {
    const elapsed = Math.floor((Date.now() - ts) / 1000);
    if (elapsed < 5) return 'just now';
    if (elapsed < 60) return elapsed + 's ago';
    if (elapsed < 3600) return Math.floor(elapsed / 60) + 'm ago';
    return Math.floor(elapsed / 3600) + 'h ago';
  }

  function formatDuration(startTs) {
    const elapsed = Math.floor((Date.now() - startTs) / 1000);
    if (elapsed < 60) return elapsed + 's';
    const mins = Math.floor(elapsed / 60);
    if (mins < 60) return mins + 'm';
    const hours = Math.floor(mins / 60);
    return hours + 'h ' + (mins % 60) + 'm';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // === PUSH NOTIFICATIONS ===
  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; i++) {
      outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
  }

  async function subscribePush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return null;
    try {
      const reg = await navigator.serviceWorker.register('/sw.js');
      await navigator.serviceWorker.ready;

      const { publicKey } = await (await fetch('/vapid-public-key')).json();

      const existing = await reg.pushManager.getSubscription();
      if (existing) {
        // Re-subscribe pattern: send existing subscription to server for freshness
        fetch('/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(existing)
        }).catch(() => {});
        return existing;
      }

      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey)
      });

      await fetch('/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sub)
      });

      return sub;
    } catch(e) {
      return null;
    }
  }

  async function enablePush() {
    const permission = await Notification.requestPermission();
    const banner = document.getElementById('push-banner');
    if (permission === 'granted') {
      await subscribePush();
      banner.style.display = 'none';
      connectionText.textContent = 'Connected \u00b7 Push enabled';
    } else {
      // denied or default — hide banner, voice + toast still work (D-04)
      banner.style.display = 'none';
    }
  }

  function dismissBanner() {
    document.getElementById('push-banner').style.display = 'none';
    localStorage.setItem('push-banner-dismissed', 'true');
  }

  async function initPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

    if (Notification.permission === 'granted') {
      // Silently re-subscribe for freshness (Pitfall 3)
      const sub = await subscribePush();
      if (sub) {
        connectionText.textContent = 'Connected \u00b7 Push enabled';
      }
    } else if (Notification.permission === 'default') {
      if (!localStorage.getItem('push-banner-dismissed')) {
        document.getElementById('push-banner').style.display = 'flex';
      }
    }
    // If 'denied', do nothing — respect user choice
  }

  // === INIT ===
  connectSSE();
  initPush();
  </script>
</body>
